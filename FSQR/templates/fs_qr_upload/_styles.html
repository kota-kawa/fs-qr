

<style>
/* Glossy FS-QR upload theme */
:root {
  --glossy-theme-gradient: var(--theme-fsqr-glossy-gradient);
  --glossy-page-background: var(--theme-fsqr-glossy-page-background);
  --glossy-panel-background: var(--theme-fsqr-glossy-panel-background);
  --glossy-shadow: var(--theme-fsqr-glossy-shadow);
  --glossy-shadow-strong: var(--theme-fsqr-glossy-shadow-strong);
}

body {
  min-height: 100vh;
  background: var(--glossy-page-background);
  background-attachment: fixed;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  background: var(--theme-fsqr-overlay-highlight);
  z-index: 0;
}

header,
#layout,
footer {
  position: relative;
  z-index: 1;
}

.modern-card-header {
  --modern-card-header-gradient: var(--glossy-theme-gradient);
  --modern-card-header-accent: var(--theme-fsqr-accent);
}

.usage-section {
  --usage-header-gradient: var(--glossy-theme-gradient);
  --usage-header-accent: var(--theme-fsqr-accent);
}

.retention-select-wrapper--azure {
  max-width: 300px;
}

.modern-page-container {
  background: transparent;
}

@media (max-width: 600px) {
  .modern-page-container {
    background: transparent;
    padding-top: 1.5rem;
  }

}

.modern-content-card {
  background: var(--glossy-panel-background);
  border: 1px solid var(--theme-fsqr-glass-border);
  box-shadow: var(--theme-fsqr-glass-shadow);
  backdrop-filter: blur(var(--theme-fsqr-glass-blur));
  -webkit-backdrop-filter: blur(var(--theme-fsqr-glass-blur));
  overflow: visible;
}

.modern-content-card::before {
  display: none;
}

.modern-card-header,
.modern-card-header::before {
  border-top-left-radius: var(--modern-card-radius);
  border-top-right-radius: var(--modern-card-radius);
}

.modern-card-header {
  background: var(--glossy-page-background);
  box-shadow: var(--theme-fsqr-glass-inset-shadow);
  overflow: hidden;
}

.modern-card-header::before {
  background: var(--glossy-page-background);
}

.modern-card-header h1 {
  text-shadow: var(--theme-fsqr-glass-title-shadow);
}

.modern-card-body {
  position: relative;
}

/* Upload area colors to match FSQR theme */
.modern-upload-area {
  border-color: var(--theme-fsqr-upload-border);
  background: var(--theme-fsqr-upload-background);
  box-shadow: var(--theme-fsqr-upload-surface-shadow);
}

.modern-upload-area:hover,
.modern-upload-area.dragover {
  border-color: var(--theme-fsqr-accent);
  background: var(--theme-fsqr-upload-background-hover);
  box-shadow: var(--theme-fsqr-upload-surface-shadow-hover);
}

.upload-icon-modern {
  color: var(--theme-fsqr-upload-icon);
}

.upload-button-modern {
  background: var(--glossy-theme-gradient);
  box-shadow: 0 12px 24px var(--glossy-shadow);
}

.upload-button-modern:hover {
  box-shadow: 0 16px 28px var(--glossy-shadow-strong);
}

.modern-file-icon {
  color: var(--theme-fsqr-upload-icon);
}

.modern-file-list {
  background: var(--theme-fsqr-file-list-background);
  border: 1px solid var(--theme-fsqr-file-list-border);
  box-shadow: var(--theme-fsqr-file-list-shadow);
}

.modern-file-item {
  background: var(--theme-fsqr-file-item-background);
  margin: 0.5rem;
  border-radius: var(--radius-md);
  border: 1px solid var(--theme-fsqr-file-item-border);
  box-shadow: var(--theme-fsqr-file-item-shadow);
}

.modern-file-item:hover {
  background: var(--theme-fsqr-file-item-hover-bg);
}

.modern-btn-success {
  background: var(--glossy-theme-gradient);
  box-shadow: 0 12px 24px var(--glossy-shadow);
}

.modern-btn-success:hover {
  box-shadow: 0 16px 28px var(--glossy-shadow-strong);
  color: var(--bg-white);
}

.modern-form-group {
  background: var(--theme-fsqr-form-group-background);
  border: 1px solid var(--theme-fsqr-form-group-border);
  border-radius: 18px;
  padding: 1.25rem;
  box-shadow: var(--theme-fsqr-form-group-shadow);
}

.modern-form-input:focus {
  border-color: var(--theme-fsqr-upload-icon);
  box-shadow: 0 0 0 3px var(--theme-fsqr-upload-focus-ring);
}

.inline-feedback {
  display: none;
  margin-top: 1rem;
  padding: 0.9rem 1rem;
  border-radius: var(--radius-lg);
  border: 1px solid var(--status-error-border-soft);
  background: var(--status-error-bg);
  color: var(--status-error-text);
  font-weight: 600;
}

.inline-feedback.is-visible {
  display: block;
}

.fsqr-transfer-card {
  display: grid;
  grid-template-columns: 88px minmax(0, 1fr);
  align-items: center;
  gap: 1rem;
  margin-top: 1rem;
  padding: 1rem 1.15rem;
  border-radius: 22px;
  border: 1px solid rgba(64, 130, 221, 0.18);
  background:
    linear-gradient(135deg, rgba(255, 255, 255, 0.97), rgba(238, 246, 255, 0.9)),
    var(--surface-elevated, #fff);
  box-shadow: 0 20px 40px -28px rgba(15, 23, 42, 0.35);
  overflow: hidden;
}

.fsqr-transfer-card__visual {
  position: relative;
  width: 88px;
  height: 88px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.fsqr-transfer-card__orb {
  position: absolute;
  inset: 0;
  border-radius: 50%;
  background:
    radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.94), rgba(223, 239, 255, 0.32) 58%, rgba(64, 130, 221, 0.16));
  box-shadow:
    inset 0 1px 0 rgba(255, 255, 255, 0.82),
    0 14px 30px -18px rgba(64, 130, 221, 0.42);
}

.fsqr-transfer-card__orb::before,
.fsqr-transfer-card__orb::after {
  content: "";
  position: absolute;
  inset: 8px;
  border-radius: 50%;
  border: 1px solid rgba(64, 130, 221, 0.16);
}

.fsqr-transfer-card__orb::before {
  animation: fsqr-transfer-pulse 2.4s ease-in-out infinite;
}

.fsqr-transfer-card__orb::after {
  inset: -4px;
  border-color: rgba(113, 170, 238, 0.28);
  animation: fsqr-transfer-spin 6s linear infinite;
}

.fsqr-transfer-card__icon {
  position: absolute;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  transition: transform 0.3s ease, opacity 0.3s ease, filter 0.3s ease;
}

.fsqr-transfer-card__icon--file {
  transform: translateX(-7px);
  color: var(--theme-fsqr-upload-icon);
  animation: fsqr-transfer-file-float 2.1s ease-in-out infinite;
}

.fsqr-transfer-card__icon--phase {
  width: 34px;
  height: 34px;
  right: 2px;
  bottom: 8px;
  border-radius: 999px;
  color: #fff;
  opacity: 0;
  pointer-events: none;
}

.fsqr-transfer-card__icon--lock {
  background: linear-gradient(135deg, #2563eb, #1d4ed8);
  box-shadow: 0 12px 24px -16px rgba(37, 99, 235, 0.75);
}

.fsqr-transfer-card__icon--upload {
  background: linear-gradient(135deg, #4aba95, #1d9a75);
  box-shadow: 0 12px 24px -16px rgba(29, 154, 117, 0.8);
}

.fsqr-transfer-card__content {
  min-width: 0;
}

.fsqr-transfer-card__eyebrow {
  margin-bottom: 0.3rem;
  color: var(--theme-fsqr-accent);
  font-size: 0.78rem;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

.fsqr-transfer-card__title {
  color: var(--text-dark);
  font-weight: 700;
  line-height: 1.45;
}

.fsqr-transfer-card__detail {
  margin-top: 0.35rem;
  color: var(--text-medium);
  font-size: 0.92rem;
  line-height: 1.5;
}

.fsqr-transfer-card__stage {
  display: grid;
  grid-template-columns: 7rem minmax(0, 1fr);
  align-items: center;
  gap: 0.75rem;
  margin-top: 0.85rem;
  color: var(--text-slate);
  font-size: 0.9rem;
  font-weight: 700;
}

.fsqr-transfer-card__progress {
  height: 12px;
  border-radius: 999px;
  background: linear-gradient(90deg, rgba(64, 130, 221, 0.12), rgba(15, 23, 42, 0.08));
  box-shadow: inset 0 1px 2px rgba(15, 23, 42, 0.08);
}

.fsqr-transfer-card__progress .progress-bar {
  background: linear-gradient(90deg, #63a4ff, #4082dd 55%, #84b8ff);
  border-radius: inherit;
  box-shadow: 0 0 22px rgba(64, 130, 221, 0.35);
}

.fsqr-transfer-card__cancel {
  margin-top: 1rem;
  border: 1px solid rgba(148, 163, 184, 0.5);
  border-radius: 10px;
  background: #ffffff;
  color: var(--text-slate);
  font-weight: 700;
  padding: 0.55rem 0.9rem;
  cursor: pointer;
}

.fsqr-transfer-card__cancel:focus-visible {
  outline: 3px solid var(--focus-ring-color);
  outline-offset: 2px;
}

.fsqr-transfer-card--upload.is-encrypting .fsqr-transfer-card__icon--lock {
  opacity: 1;
  animation: fsqr-transfer-badge-bob 1.3s ease-in-out infinite;
}

.fsqr-transfer-card--upload.is-uploading .fsqr-transfer-card__icon--upload {
  opacity: 1;
  animation: fsqr-transfer-badge-bob 1.3s ease-in-out infinite;
}

.fsqr-transfer-card--upload.is-encrypting .fsqr-transfer-card__icon--file {
  transform: translateX(-7px) translateY(-4px) scale(0.94);
  filter: saturate(1.08);
}

.fsqr-transfer-card--upload.is-uploading .fsqr-transfer-card__icon--file {
  transform: translateX(-7px) translateY(-2px) scale(0.96);
}

.retention-preview {
  margin-top: 0.9rem;
  padding: 0.9rem 1rem;
  border-radius: var(--radius-lg);
  background: var(--theme-fsqr-retention-preview-bg);
  border: 1px solid var(--theme-fsqr-retention-preview-border);
  color: var(--theme-fsqr-retention-preview-text);
}

.retention-preview strong {
  display: block;
  margin-bottom: 0.2rem;
  color: var(--theme-fsqr-retention-preview-strong);
}

.retention-preview-time {
  font-size: var(--font-size-retention-preview-time);
  font-weight: 600;
}

@keyframes fsqr-transfer-pulse {
  0%,
  100% {
    transform: scale(0.94);
    opacity: 0.55;
  }

  50% {
    transform: scale(1.04);
    opacity: 1;
  }
}

@keyframes fsqr-transfer-spin {
  from {
    transform: rotate(0deg);
  }

  to {
    transform: rotate(360deg);
  }
}

@keyframes fsqr-transfer-file-float {
  0%,
  100% {
    transform: translateX(-7px) translateY(0);
  }

  50% {
    transform: translateX(-7px) translateY(-5px);
  }
}

@keyframes fsqr-transfer-badge-bob {
  0%,
  100% {
    transform: translateY(0);
  }

  40% {
    transform: translateY(4px);
  }

  70% {
    transform: translateY(-1px);
  }
}

.usage-section {
  background: var(--glossy-panel-background);
  border: 1px solid var(--theme-fsqr-glass-border);
  box-shadow: var(--theme-fsqr-glass-shadow);
  backdrop-filter: blur(var(--theme-fsqr-glass-blur));
  -webkit-backdrop-filter: blur(var(--theme-fsqr-glass-blur));
}

.usage-section-header {
  background: var(--glossy-page-background);
  box-shadow: var(--theme-fsqr-glass-inset-shadow);
}

.usage-section-header::before {
  background: var(--glossy-page-background);
}

@media (max-width: 640px) {
  .fsqr-transfer-card {
    grid-template-columns: 1fr;
    justify-items: center;
    text-align: center;
    padding: 1rem;
  }

  .fsqr-transfer-card__content {
    width: 100%;
  }
}

</style>
