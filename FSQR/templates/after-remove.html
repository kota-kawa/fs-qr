{% extends "layout.html" %}
{% from "macros/icons.html" import icon %}

{% block extra_head %}
  <meta name="robots" content="noindex, nofollow">
  <style>
    @keyframes gentle-bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
    .icon-bounce {
      display: inline-block;
      animation: gentle-bounce 2.5s ease-in-out infinite;
    }
    .modern-muted-btn {
      background: linear-gradient(145deg, #e5e7eb 0%, #d1d5db 100%);
      color: #374151;
      text-decoration: none;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.55);
    }
    .modern-muted-btn:hover {
      background: linear-gradient(145deg, #d1d5db 0%, #9ca3af 100%);
      color: #1f2937;
      text-decoration: none;
      transform: translateY(-2px);
    }
  </style>
{% endblock %}

{% block contents %}
<div class="modern-page-container">
  <div class="modern-content-card" style="max-width: 600px; margin: 0 auto;">
    <div class="modern-card-header" style="--modern-card-header-gradient: linear-gradient(135deg, #10b981 0%, #059669 100%); --modern-card-header-accent: #10b981;">
      <h1 class="h3"><i class="bi bi-trash-fill me-2"></i>削除完了</h1>
    </div>
    <div class="modern-card-body text-center">
      <div class="mb-4 text-success icon-bounce">
        {{ icon('check_circle', size='xxl') }}
      </div>
      <h2 class="h4 mb-4 fw-bold text-dark">削除しました</h2>
      <p class="text-secondary mb-5 small">
        対象のルームまたはファイルは正常に削除されました。
      </p>
      <div class="d-grid gap-2 d-sm-flex justify-content-sm-center">
        <a href="/" class="modern-btn modern-btn-success px-4 py-2">
          <i class="bi bi-house-door-fill me-2"></i>
          ホームへ戻る
        </a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
