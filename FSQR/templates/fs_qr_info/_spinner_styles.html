
  <style>
    /* 画面中央にスピナーを配置するためのスタイル */
    .spinner-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: rgba(255, 255, 255, 0.8);
      z-index: 9999;
    }

    .spinner-second-container {
      position: relative;
      width: 200px;
      height: 200px;
    }

    .icon {
      font-size: 150px;
      transition: all 0.8s ease-in-out;
    }

    .lock {
      color: #e74c3c;
      position: absolute;
      top: 0;
      left: 0;
      transform: scale(1);
    }

    .file {
      color: #3498db;
      position: absolute;
      top: 0;
      left: 0;
      transform: scale(0);
      opacity: 0;
    }

    .decrypting .lock {
      transform: scale(1.5) rotate(-360deg);
      opacity: 0;
    }

    .decrypting .file {
      transform: scale(1);
      opacity: 1;
    }

    .text {
      position: absolute;
      bottom: -70px;
      width: 100%;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
      background: linear-gradient(90deg, #e74c3c, #3498db, #f1c40f, #9b59b6);
      background-size: 200%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: colorChange 2s linear infinite;
    }

    @keyframes colorChange {
      0% {
        background-position: 0%;
      }

      100% {
        background-position: 200%;
      }
    }

    .progress-bar-container {
      position: absolute;
      bottom: -30px;
      width: 100%;
      height: 10px;
      background-color: #ccc;
      border-radius: 5px;
      overflow: hidden;
    }

    .progress-bar {
      width: 100%;
      height: 100%;
      background-color: #3498db;
      transform-origin: left;
      /* 左端を基準に */
      transform: scaleX(0);
      /* 初期状態ではバーが0% */
      transition: transform 0.2s ease-in-out;
      /* 徐々に伸びる */
    }
  </style>
