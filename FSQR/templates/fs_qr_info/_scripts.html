
  <!-- Hidden elements for download functionality -->
  <div id="fileContent"></div>

  <script src="{{staticfile('qrcode.min.js')}}"></script>
  <script>
    async function copyTextToClipboard(text) {
      if (navigator.clipboard && window.isSecureContext) {
        try {
          await navigator.clipboard.writeText(text);
          return;
        } catch (err) {
          console.error('Clipboard API failed, falling back to execCommand', err);
        }
      }

      const textarea = document.createElement('textarea');
      textarea.value = text;
      
      // Ensure textarea is not visible and doesn't affect layout
      Object.assign(textarea.style, {
        position: 'fixed',
        top: '0',
        left: '-9999px',
        width: '2em',
        height: '2em',
        padding: '0',
        border: 'none',
        outline: 'none',
        boxShadow: 'none',
        background: 'transparent',
        opacity: '0',
        pointerEvents: 'none'
      });

      textarea.setAttribute('readonly', '');
      document.body.appendChild(textarea);
      
      try {
        textarea.select();
        // Modern browsers support focus options
        if (typeof textarea.focus === 'function') {
          textarea.focus({ preventScroll: true });
        }
        
        if (!document.execCommand('copy')) {
          throw new Error('execCommand copy failed');
        }
      } finally {
        document.body.removeChild(textarea);
      }
    }

    function setShareFeedback(message, kind) {
      const feedback = document.getElementById('shareFeedback');
      if (!feedback) {
        return;
      }
      feedback.textContent = message;
      feedback.className = `share-feedback is-visible is-${kind}`;
    }

    function translate(key, fallback) {
      if (window.FSQR_I18N && typeof window.FSQR_I18N.t === 'function') {
        return window.FSQR_I18N.t(key, fallback);
      }
      return fallback || key;
    }

    document.addEventListener('DOMContentLoaded', function () {
      function shareHash() {
        if (
          !window.location.hash
          || (!window.location.hash.startsWith('#key=') && !window.location.hash.startsWith('#pw='))
        ) {
          return '';
        }
        return window.location.hash;
      }

      function shareUrlWithKey(baseUrl) {
        const keyHash = shareHash();
        if (!baseUrl || !keyHash) {
          return baseUrl || '';
        }
        return `${baseUrl}${keyHash}`;
      }

      function renderShareQrCode(url) {
        const qrContainer = document.getElementById('shareQrCode');
        if (!qrContainer || !url || typeof QRCode !== 'function') {
          return;
        }
        qrContainer.innerHTML = '';
        new QRCode(qrContainer, {
          text: url,
          width: 160,
          height: 160,
          correctLevel: QRCode.CorrectLevel.M
        });
      }

      const shareRoomUrl = document.getElementById('shareRoomUrl');
      if (shareRoomUrl) {
        const baseShareUrl = shareRoomUrl.getAttribute('data-visible-value') || shareRoomUrl.textContent.trim();
        const fullShareUrl = shareUrlWithKey(baseShareUrl);
        if (fullShareUrl) {
          shareRoomUrl.textContent = fullShareUrl;
          shareRoomUrl.setAttribute('data-visible-value', fullShareUrl);
          const urlRow = shareRoomUrl.closest('.room-info-value-row');
          const urlCopyButton = urlRow ? urlRow.querySelector('.copy-url-button') : null;
          if (urlCopyButton) {
            urlCopyButton.setAttribute('data-copy-value', fullShareUrl);
          }
          document.querySelectorAll('.share-url-button').forEach((shareButton) => {
            shareButton.setAttribute('data-share-url', fullShareUrl);
          });
          renderShareQrCode(fullShareUrl);
        }
      }

      document.querySelectorAll('.reveal-value-button').forEach((button) => {
        button.addEventListener('click', () => {
          const targetId = button.getAttribute('data-target');
          const target = targetId ? document.getElementById(targetId) : null;
          if (!target) {
            return;
          }

          const visibleValue = target.getAttribute('data-visible-value') || '';
          const maskedValue = target.getAttribute('data-masked-value') || '••••••';
          const isMasked = target.classList.contains('is-masked');
          target.textContent = isMasked ? visibleValue : maskedValue;
          target.classList.toggle('is-masked', !isMasked);
          button.innerHTML = isMasked
            ? (button.getAttribute('data-hide-label') || translate('common.hide', 'Hide'))
            : (button.getAttribute('data-show-label') || translate('common.show', 'Show'));
        });
      });

      document.querySelectorAll('.copy-url-button').forEach((button) => {
        button.addEventListener('click', async () => {
          const targetId = button.getAttribute('data-copy-target');
          const target = targetId ? document.getElementById(targetId) : null;
          const text = button.getAttribute('data-copy-value')
            || (target ? (target.getAttribute('data-visible-value') || target.textContent.trim()) : '');
          if (!text) {
            return;
          }
          const defaultLabel = button.getAttribute('data-default-label') || translate('common.copy', 'Copy');
          const copiedLabel = button.getAttribute('data-copied-label') || translate('common.copied', 'Copied');
          if (!button.hasAttribute('aria-label')) {
            button.setAttribute('aria-label', defaultLabel);
          }
          if (!button.hasAttribute('title')) {
            button.setAttribute('title', defaultLabel);
          }

          try {
            await copyTextToClipboard(text);
            button.classList.add('copied');
            button.setAttribute('aria-label', copiedLabel);
            button.setAttribute('title', copiedLabel);
            setTimeout(() => {
              button.classList.remove('copied');
              button.setAttribute('aria-label', defaultLabel);
              button.setAttribute('title', defaultLabel);
            }, 2000);
          } catch (error) {
            setShareFeedback(translate('share.copy_manual_error', 'Copy failed. Display it and copy it manually.'), 'error');
          }
        });
      });

      document.querySelectorAll('#copyShareLinkPrimary, #copyCredentialsPrimary').forEach((button) => {
        button.addEventListener('click', async () => {
          const text = button.getAttribute('data-copy-value') || '';
          if (!text) {
            return;
          }
          try {
            await copyTextToClipboard(text);
            setShareFeedback(translate('share.copy_share_success', 'Copied. You can share it as-is.'), 'success');
          } catch (error) {
            setShareFeedback(translate('share.copy_content_manual_error', 'Copy failed. Copy the displayed content manually.'), 'error');
          }
        });
      });

      document.querySelectorAll('.share-url-button').forEach((button) => {
        button.addEventListener('click', async () => {
          const url = button.getAttribute('data-share-url') || window.location.href;
          if (!url) {
            return;
          }
          const title = button.getAttribute('data-share-title') || document.title;
          if (navigator.share) {
            try {
              await navigator.share({ title: title, url: url });
            } catch (error) {
              if (error && error.name === 'AbortError') {
                return;
              }
              console.error('Error sharing:', error);
            }
            return;
          }
          try {
            await copyTextToClipboard(url);
            setShareFeedback(translate('share.copied_to_clipboard', 'URLをコピーしました。貼り付けて共有できます。'), 'success');
          } catch (error) {
            setShareFeedback(translate('share.copy_manual_error', 'コピーに失敗しました。URLを表示して手動でコピーしてください。'), 'error');
          }
        });
      });
    });
  </script>


<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.7.1/jszip.min.js" integrity="sha384-wj2H3JPCraDV2eZ/vqVPAvEIkFv7WCZAac4WV7Gt/hfpso4sCcOuARI3O2rRqFV0" crossorigin="anonymous"></script>
<script>
  document.addEventListener('DOMContentLoaded', function () {
    const downloadForm = document.getElementById('downloadForm');
    if (!downloadForm) {
      return;
    }

    const container = document.getElementById('animationContainer');
    const spinnerContainer = document.getElementById('spinnerContainer');
    const progressBar = document.getElementById('progressBar');
    const statusText = document.getElementById('statusText');
    const statusEyebrow = document.getElementById('statusEyebrow');
    const secureId = {{ secure_id | tojson }};
    const serverPassword = {{ password | tojson }};
    const shareParams = new URLSearchParams((window.location.hash || '').replace(/^#/, ''));
    const fragmentKey = shareParams.get('key') || '';
    const fragmentPassword = shareParams.get('pw') || '';
    const decryptionKey = fragmentKey || fragmentPassword || serverPassword || secureId.split('-')[0];
    const decryptionKeyMode = fragmentKey
      ? 'raw-base64url'
      : ((fragmentPassword || serverPassword) ? 'password' : 'legacy-id');

    function translate(key, fallback) {
      if (window.FSQR_I18N && typeof window.FSQR_I18N.t === 'function') {
        return window.FSQR_I18N.t(key, fallback);
      }
      return fallback || key;
    }

    function formatMessage(key, fallback, replacements) {
      let message = translate(key, fallback);
      Object.keys(replacements || {}).forEach((name) => {
        message = message.replace(`{${name}}`, String(replacements[name]));
      });
      return message;
    }

    function setPhase(phase) {
      if (!container) {
        return;
      }
      container.classList.remove('is-receiving', 'is-decrypting');
      if (phase === 'receiving') {
        container.classList.add('is-receiving');
        if (statusEyebrow) {
          statusEyebrow.textContent = 'Downloading';
        }
      } else if (phase === 'decrypting') {
        container.classList.add('is-decrypting');
        if (statusEyebrow) {
          statusEyebrow.textContent = 'Decrypting';
        }
      }
    }

    function setProgress(value) {
      if (!progressBar) {
        return;
      }
      progressBar.style.transform = `scaleX(${Math.max(0, Math.min(1, value))})`;
    }

    function showSpinner(message, phase) {
      if (spinnerContainer) {
        spinnerContainer.style.display = 'flex';
        spinnerContainer.classList.remove('spinner-container--hidden');
      }
      setPhase(phase);
      if (statusText) {
        statusText.textContent = message;
      }
    }

    function hideSpinner() {
      if (spinnerContainer) {
        spinnerContainer.style.display = 'none';
        spinnerContainer.classList.add('spinner-container--hidden');
      }
      setPhase('');
      setProgress(0);
    }

    function base64UrlDecode(value) {
      let normalized = String(value || '').replace(/-/g, '+').replace(/_/g, '/');
      while (normalized.length % 4) {
        normalized += '=';
      }
      const binary = atob(normalized);
      const bytes = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i += 1) {
        bytes[i] = binary.charCodeAt(i);
      }
      return bytes;
    }

    async function importDecryptionKey(key) {
      if (decryptionKeyMode === 'raw-base64url') {
        const rawKey = base64UrlDecode(key);
        if (rawKey.length !== 32) {
          throw new Error(translate('download.decrypt_failed', 'Decryption failed.'));
        }
        return crypto.subtle.importKey('raw', rawKey, { name: 'AES-256-GCM' }, false, ['decrypt']);
      }
      const keyBuffer = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(key));
      return crypto.subtle.importKey('raw', keyBuffer, { name: 'AES-256-GCM' }, false, ['decrypt']);
    }

    async function decryptFile(encryptedBuffer, key, iv) {
      const cryptoKey = await importDecryptionKey(key);

      try {
        return await crypto.subtle.decrypt({ name: 'AES-256-GCM', iv }, cryptoKey, encryptedBuffer);
      } catch (error) {
        console.error('Decryption error:', error);
        return null;
      }
    }

    async function decryptSingleFile(encryptedBlob, key) {
      try {
        const arrayBuffer = await encryptedBlob.arrayBuffer();
        const iv = arrayBuffer.slice(0, 12);
        const encryptedContent = arrayBuffer.slice(12);
        if (statusText) {
          statusText.textContent = formatMessage('download.decrypting_progress', 'Decrypting... {percent}%', { percent: 35 });
        }
        setProgress(0.35);
        const decryptedContent = await decryptFile(encryptedContent, key, iv);

        if (!decryptedContent) {
          return null;
        }

        if (statusText) {
          statusText.textContent = formatMessage('download.decrypting_progress', 'Decrypting... {percent}%', { percent: 100 });
        }
        setProgress(1);
        return new Blob([decryptedContent]);
      } catch (error) {
        console.error('Single-file decryption error:', error);
        return null;
      }
    }

    async function decryptAndBuildZip(encryptedBlob, key) {
      const zip = await JSZip.loadAsync(encryptedBlob);
      const decryptedZip = new JSZip();
      const fileNames = Object.keys(zip.files);
      const totalFiles = fileNames.length;
      let processedFiles = 0;

      for (const fileName of fileNames) {
        const fileEntry = zip.file(fileName);
        if (!fileEntry) {
          continue;
        }

        const fileData = await fileEntry.async('arraybuffer');
        const iv = fileData.slice(0, 12);
        const encryptedContent = fileData.slice(12);
        const decryptedContent = await decryptFile(encryptedContent, key, iv);

        if (!decryptedContent) {
          return null;
        }

        decryptedZip.file(fileName.replace(/\.enc$/i, ''), decryptedContent);
        processedFiles += 1;
        if (statusText) {
          statusText.textContent = formatMessage(
            'download.decrypting_progress',
            'Decrypting... {percent}%',
            { percent: Math.round((processedFiles / totalFiles) * 100) }
          );
        }
        setProgress(totalFiles ? processedFiles / totalFiles : 1);
      }

      return decryptedZip.generateAsync({ type: 'blob' });
    }

    function downloadEncryptedBlob() {
      return new Promise((resolve, reject) => {
        const csrfMeta = document.querySelector('meta[name="csrf-token"]');
        const csrfToken = csrfMeta ? csrfMeta.getAttribute('content') : '';
        const xhr = new XMLHttpRequest();
        xhr.open('POST', downloadForm.action, true);
        xhr.responseType = 'blob';
        if (csrfToken) {
          xhr.setRequestHeader('X-CSRF-Token', csrfToken);
        }

        xhr.onprogress = function (event) {
          if (event.lengthComputable) {
            const percent = event.loaded / event.total;
            setProgress(percent);
            if (statusText) {
              statusText.textContent = formatMessage(
                'download.downloading_progress',
                'Downloading... {percent}%',
                { percent: Math.round(percent * 100) }
              );
            }
          }
        };

        xhr.onload = function () {
          if (xhr.status >= 200 && xhr.status < 300) {
            resolve({
              blob: xhr.response,
              fileType: xhr.getResponseHeader('X-File-Type') || 'multiple',
              originalFilename: xhr.getResponseHeader('X-Original-Filename') || ''
            });
            return;
          }
          reject(new Error(translate('download.failed', 'Download failed.')));
        };

        xhr.onerror = function () {
          reject(new Error(translate('download.failed', 'Download failed.')));
        };

        xhr.send();
      });
    }

    downloadForm.addEventListener('submit', async function (event) {
      event.preventDefault();
      showSpinner(formatMessage('download.downloading_progress', 'Downloading... {percent}%', { percent: 0 }), 'receiving');
      setProgress(0);

      try {
        const downloadResult = await downloadEncryptedBlob();
        const encryptedBlob = downloadResult.blob;
        const fileType = downloadResult.fileType;
        const originalFilename = downloadResult.originalFilename;

        showSpinner(formatMessage('download.decrypting_progress', 'Decrypting... {percent}%', { percent: 0 }), 'decrypting');
        setProgress(0);

        let decryptedBlob;
        let downloadFilename;

        if (fileType === 'single') {
          decryptedBlob = await decryptSingleFile(encryptedBlob, decryptionKey);
          downloadFilename = originalFilename || `${secureId}_decrypted`;
        } else {
          decryptedBlob = await decryptAndBuildZip(encryptedBlob, decryptionKey);
          downloadFilename = `${secureId}.zip`;
        }

        if (!decryptedBlob) {
          throw new Error(translate('download.decrypt_failed', 'Decryption failed.'));
        }

        const objectUrl = URL.createObjectURL(decryptedBlob);
        const link = document.createElement('a');
        link.href = objectUrl;
        link.download = downloadFilename;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        if (statusText) {
          statusText.textContent = translate('download.complete', 'Download complete!');
        }
        setProgress(1);
        window.setTimeout(function () {
          URL.revokeObjectURL(objectUrl);
        }, 1000);
      } catch (error) {
        window.showAlertModal(error instanceof Error ? error.message : translate('download.decrypt_failed', 'Decryption failed.'));
      } finally {
        hideSpinner();
      }
    });
  });
</script>
