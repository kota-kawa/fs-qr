
  <!-- Hidden elements for download functionality -->
  <div id="fileContent"></div>

  <script>
    async function copyTextToClipboard(text) {
      if (navigator.clipboard && window.isSecureContext) {
        return navigator.clipboard.writeText(text);
      }

      return new Promise((resolve, reject) => {
        const textarea = document.createElement('textarea');
        textarea.value = text;
        textarea.style.position = 'fixed';
        textarea.style.opacity = '0';
        document.body.appendChild(textarea);
        textarea.focus();
        textarea.select();

        try {
          if (document.execCommand('copy')) {
            resolve();
          } else {
            reject(new Error('execCommand failed'));
          }
        } catch (err) {
          reject(err);
        } finally {
          document.body.removeChild(textarea);
        }
      });
    }

    function setShareFeedback(message, kind) {
      const feedback = document.getElementById('shareFeedback');
      if (!feedback) {
        return;
      }
      feedback.textContent = message;
      feedback.className = `share-feedback is-visible is-${kind}`;
    }

    document.addEventListener('DOMContentLoaded', function () {
      document.querySelectorAll('.reveal-value-button').forEach((button) => {
        button.addEventListener('click', () => {
          const targetId = button.getAttribute('data-target');
          const target = targetId ? document.getElementById(targetId) : null;
          if (!target) {
            return;
          }

          const visibleValue = target.getAttribute('data-visible-value') || '';
          const maskedValue = target.getAttribute('data-masked-value') || '••••••';
          const isMasked = target.classList.contains('is-masked');
          target.textContent = isMasked ? visibleValue : maskedValue;
          target.classList.toggle('is-masked', !isMasked);
          button.innerHTML = isMasked
            ? (button.getAttribute('data-hide-label') || '隠す')
            : (button.getAttribute('data-show-label') || '表示');
        });
      });

      document.querySelectorAll('.copy-url-button').forEach((button) => {
        button.addEventListener('click', async () => {
          const targetId = button.getAttribute('data-copy-target');
          const target = targetId ? document.getElementById(targetId) : null;
          const text = button.getAttribute('data-copy-value')
            || (target ? (target.getAttribute('data-visible-value') || target.textContent.trim()) : '');
          if (!text) {
            return;
          }
          const defaultLabel = button.getAttribute('data-default-label') || 'コピー';
          const copiedLabel = button.getAttribute('data-copied-label') || 'コピー済み';
          if (!button.hasAttribute('aria-label')) {
            button.setAttribute('aria-label', defaultLabel);
          }
          if (!button.hasAttribute('title')) {
            button.setAttribute('title', defaultLabel);
          }

          try {
            await copyTextToClipboard(text);
            button.classList.add('copied');
            button.setAttribute('aria-label', copiedLabel);
            if (button.hasAttribute('title')) {
              button.setAttribute('title', copiedLabel);
            }
            setShareFeedback('コピーしました。相手にそのまま送れます。', 'success');
            setTimeout(() => {
              button.classList.remove('copied');
              button.setAttribute('aria-label', defaultLabel);
              if (button.hasAttribute('title')) {
                button.setAttribute('title', defaultLabel);
              }
            }, 2000);
          } catch (error) {
            setShareFeedback('コピーに失敗しました。表示して手動でコピーしてください。', 'error');
          }
        });
      });

      document.querySelectorAll('#copyShareLinkPrimary, #copyCredentialsPrimary').forEach((button) => {
        button.addEventListener('click', async () => {
          const text = button.getAttribute('data-copy-value') || '';
          if (!text) {
            return;
          }
          try {
            await copyTextToClipboard(text);
            setShareFeedback('コピーしました。相手にそのまま共有できます。', 'success');
          } catch (error) {
            setShareFeedback('コピーに失敗しました。表示内容を手動でコピーしてください。', 'error');
          }
        });
      });
    });
  </script>


<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.7.1/jszip.min.js" integrity="sha384-wj2H3JPCraDV2eZ/vqVPAvEIkFv7WCZAac4WV7Gt/hfpso4sCcOuARI3O2rRqFV0" crossorigin="anonymous"></script>
<script>
  document.addEventListener('DOMContentLoaded', function () {
    const downloadForm = document.getElementById('downloadForm');
    if (!downloadForm) {
      return;
    }

    const container = document.getElementById('animationContainer');
    const spinnerContainer = document.getElementById('spinnerContainer');
    const progressBar = document.getElementById('progressBar');
    const statusText = document.getElementById('statusText');
    const secureId = {{ secure_id | tojson }};
    const decryptionKey = secureId.split('-')[0];

    function setProgress(value) {
      if (!progressBar) {
        return;
      }
      progressBar.style.transform = `scaleX(${Math.max(0, Math.min(1, value))})`;
    }

    function showSpinner(message) {
      if (spinnerContainer) {
        spinnerContainer.style.display = 'flex';
      }
      if (container) {
        container.classList.add('decrypting');
      }
      if (statusText) {
        statusText.textContent = message;
      }
    }

    function hideSpinner() {
      if (spinnerContainer) {
        spinnerContainer.style.display = 'none';
      }
      if (container) {
        container.classList.remove('decrypting');
      }
      setProgress(0);
    }

    window.setInterval(function () {
      if (container) {
        container.classList.toggle('decrypting');
      }
    }, 1000);

    async function decryptFile(encryptedBuffer, key, iv) {
      const keyBuffer = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(key));
      const cryptoKey = await crypto.subtle.importKey(
        'raw',
        keyBuffer,
        { name: 'AES-GCM' },
        false,
        ['decrypt']
      );

      try {
        return await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, cryptoKey, encryptedBuffer);
      } catch (error) {
        console.error('復号エラー:', error);
        return null;
      }
    }

    async function decryptSingleFile(encryptedBlob, key) {
      try {
        const arrayBuffer = await encryptedBlob.arrayBuffer();
        const iv = arrayBuffer.slice(0, 12);
        const encryptedContent = arrayBuffer.slice(12);
        const decryptedContent = await decryptFile(encryptedContent, key, iv);

        if (!decryptedContent) {
          return null;
        }

        setProgress(1);
        return new Blob([decryptedContent]);
      } catch (error) {
        console.error('単一ファイル復号エラー:', error);
        return null;
      }
    }

    async function decryptAndBuildZip(encryptedBlob, key) {
      const zip = await JSZip.loadAsync(encryptedBlob);
      const decryptedZip = new JSZip();
      const fileNames = Object.keys(zip.files);
      const totalFiles = fileNames.length;
      let processedFiles = 0;

      for (const fileName of fileNames) {
        const fileEntry = zip.file(fileName);
        if (!fileEntry) {
          continue;
        }

        const fileData = await fileEntry.async('arraybuffer');
        const iv = fileData.slice(0, 12);
        const encryptedContent = fileData.slice(12);
        const decryptedContent = await decryptFile(encryptedContent, key, iv);

        if (!decryptedContent) {
          return null;
        }

        decryptedZip.file(fileName.replace(/\.enc$/i, ''), decryptedContent);
        processedFiles += 1;
        setProgress(totalFiles ? processedFiles / totalFiles : 1);
      }

      return decryptedZip.generateAsync({ type: 'blob' });
    }

    downloadForm.addEventListener('submit', async function (event) {
      event.preventDefault();
      showSpinner('受信中...');

      try {
        const csrfMeta = document.querySelector('meta[name="csrf-token"]');
        const csrfToken = csrfMeta ? csrfMeta.getAttribute('content') : '';
        const response = await fetch(downloadForm.action, {
          method: 'POST',
          credentials: 'same-origin',
          headers: csrfToken ? { 'X-CSRF-Token': csrfToken } : {}
        });

        if (!response.ok) {
          throw new Error('ダウンロードに失敗しました。');
        }

        const encryptedBlob = await response.blob();
        const fileType = response.headers.get('X-File-Type') || 'multiple';
        const originalFilename = response.headers.get('X-Original-Filename') || '';

        showSpinner('復号中...');

        let decryptedBlob;
        let downloadFilename;

        if (fileType === 'single') {
          decryptedBlob = await decryptSingleFile(encryptedBlob, decryptionKey);
          downloadFilename = originalFilename || `${secureId}_decrypted`;
        } else {
          decryptedBlob = await decryptAndBuildZip(encryptedBlob, decryptionKey);
          downloadFilename = `${secureId}.zip`;
        }

        if (!decryptedBlob) {
          throw new Error('復号に失敗しました。');
        }

        const objectUrl = URL.createObjectURL(decryptedBlob);
        const link = document.createElement('a');
        link.href = objectUrl;
        link.download = downloadFilename;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        window.setTimeout(function () {
          URL.revokeObjectURL(objectUrl);
        }, 1000);
      } catch (error) {
        window.alert(error instanceof Error ? error.message : '復号に失敗しました。');
      } finally {
        hideSpinner();
      }
    });
  });
</script>
