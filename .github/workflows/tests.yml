name: CI / CD

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: fs-qr-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  RUFF_VERSION: "0.15.4"
  PIP_AUDIT_VERSION: "2.10.0"
  MYPY_VERSION: "1.15.0"
  TRIVY_IMAGE: "aquasec/trivy:0.68.1"

jobs:
  lint:
    name: Ruff (Python lint + format)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail

          if [ "${GITHUB_EVENT_NAME}" = "pull_request" ]; then
            checkout_ref="refs/pull/${PR_NUMBER}/merge"
          else
            checkout_ref="${GITHUB_SHA}"
          fi

          git init .
          git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          git -c protocol.version=2 fetch --no-tags --prune --depth=1 origin "${checkout_ref}"
          git checkout --detach FETCH_HEAD

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install ruff
        run: python -m pip install ruff==${{ env.RUFF_VERSION }}

      - name: Ruff lint
        run: python -m ruff check .

      - name: Ruff format check
        run: python -m ruff format --check .

  audit:
    name: pip-audit (dependency vulnerabilities)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail

          if [ "${GITHUB_EVENT_NAME}" = "pull_request" ]; then
            checkout_ref="refs/pull/${PR_NUMBER}/merge"
          else
            checkout_ref="${GITHUB_SHA}"
          fi

          git init .
          git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          git -c protocol.version=2 fetch --no-tags --prune --depth=1 origin "${checkout_ref}"
          git checkout --detach FETCH_HEAD

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install pip-audit
        run: python -m pip install pip-audit==${{ env.PIP_AUDIT_VERSION }}

      - name: Run pip-audit
        run: pip-audit -r requirements.txt --no-deps --disable-pip

  test:
    name: Pytest (Python 3.11)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PYTHONFAULTHANDLER: "1"

    steps:
      - name: Checkout repository
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail

          if [ "${GITHUB_EVENT_NAME}" = "pull_request" ]; then
            checkout_ref="refs/pull/${PR_NUMBER}/merge"
          else
            checkout_ref="${GITHUB_SHA}"
          fi

          git init .
          git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          git -c protocol.version=2 fetch --no-tags --prune --depth=1 origin "${checkout_ref}"
          git checkout --detach FETCH_HEAD

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pytest httpx pytest-cov pytest-xdist

      - name: Validate locale catalogs
        run: |
          set -euo pipefail
          python scripts/validate_locales.py --strict-phrases

      - name: Run test suite
        run: |
          set -euo pipefail
          python -m coverage erase
          python -m pytest -q -n auto tests/test_no_japanese_leakage.py \
            --cov=. \
            --cov-report=
          python -m pytest -q \
            --ignore=tests/test_no_japanese_leakage.py \
            --cov=. \
            --cov-append \
            --cov-report=term-missing \
            --cov-fail-under=75

  image-scan:
    name: Docker build + Trivy scan
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail

          if [ "${GITHUB_EVENT_NAME}" = "pull_request" ]; then
            checkout_ref="refs/pull/${PR_NUMBER}/merge"
          else
            checkout_ref="${GITHUB_SHA}"
          fi

          git init .
          git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          git -c protocol.version=2 fetch --no-tags --prune --depth=1 origin "${checkout_ref}"
          git checkout --detach FETCH_HEAD

      - name: Build Docker image
        run: |
          set -euo pipefail
          docker build --tag fs-qr-ci:${{ github.sha }} .

      - name: Scan Docker image with Trivy
        run: |
          set -euo pipefail
          mkdir -p "${HOME}/.cache/trivy"
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "${HOME}/.cache/trivy:/root/.cache/" \
            "${TRIVY_IMAGE}" image \
            --scanners vuln \
            --format table \
            --exit-code 1 \
            --ignore-unfixed \
            --pkg-types os,library \
            --severity CRITICAL,HIGH \
            --skip-version-check \
            fs-qr-ci:${{ github.sha }}

  typecheck:
    name: mypy (static type checking)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail

          if [ "${GITHUB_EVENT_NAME}" = "pull_request" ]; then
            checkout_ref="refs/pull/${PR_NUMBER}/merge"
          else
            checkout_ref="${GITHUB_SHA}"
          fi

          git init .
          git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          git -c protocol.version=2 fetch --no-tags --prune --depth=1 origin "${checkout_ref}"
          git checkout --detach FETCH_HEAD

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt mypy==${{ env.MYPY_VERSION }}

      - name: Run mypy
        run: |
          set -euo pipefail
          python -m mypy --config-file pyproject.toml

  deploy:
    name: Deploy (main push)
    runs-on: ubuntu-latest
    needs: [lint, audit, test, image-scan, typecheck]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 15
    env:
      DEPLOY_BRANCH: "main"
      DEPLOY_PATH: ${{ secrets.DEPLAY_PATH || secrets.DEPLOY_PATH || '/var/www/fs-qr' }}

    steps:
      - name: Check deployment secrets
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
        run: |
          set -euo pipefail
          missing=()
          for name in SERVER_HOST SERVER_USER SERVER_SSH_KEY; do
            if [ -z "${!name:-}" ]; then
              missing+=("${name}")
            fi
          done
          if [ "${#missing[@]}" -gt 0 ]; then
            echo "::error::Required GitHub secrets are missing: ${missing[*]}"
            exit 1
          fi

      - name: Configure SSH key
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          printf '%s\n' "${SERVER_SSH_KEY}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          port="${SERVER_PORT:-22}"
          ssh-keyscan -p "${port}" -H "${SERVER_HOST}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy via SSH
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
          DEPLOY_PATH: ${{ secrets.DEPLAY_PATH || secrets.DEPLOY_PATH || '/var/www/fs-qr' }}
          DEPLOY_BRANCH: ${{ env.DEPLOY_BRANCH }}
        run: |
          set -euo pipefail
          port="${SERVER_PORT:-22}"
          ssh -i ~/.ssh/id_rsa -o BatchMode=yes -o StrictHostKeyChecking=accept-new -p "${port}" "${SERVER_USER}@${SERVER_HOST}" \
            "DEPLOY_PATH='${DEPLOY_PATH}' DEPLOY_BRANCH='${DEPLOY_BRANCH}' bash -seu" <<'REMOTE_SCRIPT'
          set -euo pipefail

          cd "${DEPLOY_PATH}"

          if [ ! -d .git ]; then
            echo "Deployment path is not a git checkout: ${DEPLOY_PATH}" >&2
            exit 1
          fi

          if [ ! -f .env ]; then
            echo ".env is missing at ${DEPLOY_PATH}. Create it on the server before deploying." >&2
            exit 1
          fi

          PREV_COMMIT="$(git rev-parse HEAD)"

          diagnose() {
            echo "Deployment diagnostics"
            docker compose --profile blue --profile green ps || true
            docker compose --profile blue --profile green logs web-blue web-green scheduler db redis --tail=200 || true
          }

          rollback() {
            # Blue-Green スクリプトは切替に失敗しても旧コンテナを生かしたまま中断するため、
            # サービス自体は停止していない。ここでは作業ツリーを元コミットへ戻すだけ。
            echo "Deploy failed; previous color stays live. Rolling back git tree to ${PREV_COMMIT}"
            git reset --hard "${PREV_COMMIT}"
          }

          on_error() {
            trap - ERR
            diagnose
            rollback
          }

          trap on_error ERR

          git fetch origin "${DEPLOY_BRANCH}"
          git reset --hard "origin/${DEPLOY_BRANCH}"

          # 常駐インフラ（無停止対象外）。起動済みなら no-op。
          # Blue-Green の web スロットは depends_on で db/redis の healthy を待つため先に起動する。
          docker compose up -d db redis

          # Blue-Green 無停止切替: 非アクティブ色をビルド → /healthz が healthy になるまで待機
          # → nginx の active backend を切替えて reload → 旧色を drain して停止。
          # 新コンテナが healthy にならない/nginx -t 失敗時はスクリプトが切替せず中断するので、
          # 現行サービスは止まらない（その場合は上の on_error が git ツリーを戻す）。
          NGINX_SITE_CONF="${DEPLOY_PATH}/fs-qr.conf" REPO_DIR="${DEPLOY_PATH}" bash scripts/deploy_bluegreen.sh

          trap - ERR
          docker image prune -f || true
          REMOTE_SCRIPT
