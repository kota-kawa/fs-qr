services:
  web:
    build: .
    environment:
      - SQL_USER=${SQL_USER}
      - SQL_PW=${SQL_PW}
      - SQL_DB=${SQL_DB}
      - SQL_HOST=${SQL_HOST:-db}
      - REDIS_URL=redis://redis:6379/0
      - GROUP_UPLOAD_DIR=${GROUP_UPLOAD_DIR:-/app/storage/group_uploads}
    volumes:
      - .:/app  # アプリケーションコードのマウント
      - ./logs:/app/logs  # ホストの ./logs ディレクトリをコンテナ内 /app/logs にマウント
      - ./geoip:/app/geoip  # GeoIP DB for language detection and updates
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "5000:5000"  # ホストの5000番ポートをDockerのwebサービスにマッピング
    healthcheck:
      test: ["CMD", "python3", "-c", "from urllib.request import urlopen; urlopen('http://127.0.0.1:5000/').close()"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - app-network

  scheduler:
    build: .
    environment:
      - SQL_USER=${SQL_USER}
      - SQL_PW=${SQL_PW}
      - SQL_DB=${SQL_DB}
      - SQL_HOST=${SQL_HOST:-db}
      - REDIS_URL=redis://redis:6379/0
      - GROUP_UPLOAD_DIR=${GROUP_UPLOAD_DIR:-/app/storage/group_uploads}
    volumes:
      - .:/app
      - ./logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command:
      - /usr/local/bin/wait-for-it
      - db:3306
      - --strict
      - --timeout=120
      - --
      - python
      - scheduler.py
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "from pathlib import Path; raise SystemExit(0 if 'scheduler.py' in Path('/proc/1/cmdline').read_text(errors='ignore') else 1)",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - app-network

  db:
    image: mysql:8.4.9
    restart: always
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=fsqr
      - MYSQL_USER=${SQL_USER}
      - MYSQL_PASSWORD=${SQL_PW}
    volumes:
      - db_data:/var/lib/mysql
      - ./db_init/create_tables.sql:/docker-entrypoint-initdb.d/00_create_tables.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 30s
    networks:
      - app-network

  redis:
    image: redis:7.4.7-alpine
    command: redis-server --maxmemory 2gb --maxmemory-policy volatile-lru
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - app-network

volumes:
  db_data:
    name: ${MYSQL_VOLUME_NAME:-fsqr_mysql_data_v2}

networks:
  app-network:
