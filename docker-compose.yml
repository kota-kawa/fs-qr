# Blue-Green デプロイ用の共通設定。web-blue / web-green が共有する。
# 重要: 本番の Blue-Green ではコードをイメージに焼き込む（COPY . /app）ため、
# 開発用の `.:/app` ソース bind mount は付けない。各色がビルド済みイメージに
# 固定されることで「旧版を生かしたまま新版へ切替」が成立する。書き込みが必要な
# logs / geoip / storage のみ bind mount する（storage は nginx の X-Accel-Redirect
# が参照するホスト ./storage と一致させること）。
x-web-common: &web-common
  build: .
  environment:
    - SQL_USER=${SQL_USER}
    - SQL_PW=${SQL_PW}
    - SQL_DB=${SQL_DB}
    - SQL_HOST=${SQL_HOST:-db}
    - REDIS_URL=redis://redis:6379/0
    - GROUP_UPLOAD_DIR=${GROUP_UPLOAD_DIR:-/app/storage/group_uploads}
    - UPLOAD_MAX_FILES=${UPLOAD_MAX_FILES:-30}
    - UPLOAD_MAX_TOTAL_SIZE_MB=${UPLOAD_MAX_TOTAL_SIZE_MB:-1024}
  volumes:
    - ./logs:/app/logs      # アクセス/エラーログ
    - ./geoip:/app/geoip    # GeoIP DB（言語判定・自動更新）
    - ./storage:/app/storage  # アップロード実体（nginx /_protected/ alias と一致）
  depends_on:
    db:
      condition: service_healthy
    redis:
      condition: service_healthy
  healthcheck:
    test: ["CMD", "python3", "-c", "from urllib.request import urlopen; urlopen('http://127.0.0.1:5000/healthz').close()"]
    interval: 15s
    timeout: 5s
    retries: 5
    start_period: 30s
  restart: unless-stopped
  networks:
    - app-network

services:
  # blue スロット: ホスト 127.0.0.1:5000。profiles により bare `up` では起動せず、
  # デプロイスクリプト（scripts/deploy_bluegreen.sh）が色を指定して制御する。
  web-blue:
    <<: *web-common
    ports:
      - "127.0.0.1:5000:5000"
    profiles: ["blue"]

  # green スロット: ホスト 127.0.0.1:5030。
  web-green:
    <<: *web-common
    ports:
      - "127.0.0.1:5030:5000"
    profiles: ["green"]

  scheduler:
    build: .
    environment:
      - SQL_USER=${SQL_USER}
      - SQL_PW=${SQL_PW}
      - SQL_DB=${SQL_DB}
      - SQL_HOST=${SQL_HOST:-db}
      - REDIS_URL=redis://redis:6379/0
      - GROUP_UPLOAD_DIR=${GROUP_UPLOAD_DIR:-/app/storage/group_uploads}
    volumes:
      - .:/app
      - ./logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command:
      - /usr/local/bin/wait-for-it
      - db:3306
      - --strict
      - --timeout=120
      - --
      - python
      - scheduler.py
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "from pathlib import Path; raise SystemExit(0 if 'scheduler.py' in Path('/proc/1/cmdline').read_text(errors='ignore') else 1)",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - app-network

  db:
    image: mysql:8.4.10
    restart: always
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=fsqr
      - MYSQL_USER=${SQL_USER}
      - MYSQL_PASSWORD=${SQL_PW}
    volumes:
      - db_data:/var/lib/mysql
      - ./db_init/create_tables.sql:/docker-entrypoint-initdb.d/00_create_tables.sql:ro
      - ./db/my.cnf:/etc/mysql/conf.d/zz-fsqr.cnf:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 30s
    networks:
      - app-network

  redis:
    image: redis:7.4.9-alpine
    command: redis-server --maxmemory 2gb --maxmemory-policy volatile-lru
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - app-network

volumes:
  db_data:
    name: ${MYSQL_VOLUME_NAME:-fsqr_mysql_data_v2}

networks:
  app-network:
