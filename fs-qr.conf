# 旧形式 /fs-qr/{room_id}/{password} は URL パスに認証情報を含むため、
# 共有トークンとあわせてアクセスログでは伏せ字にする。
map $request_uri $fsqr_loggable_uri {
    ~^/fs-qr/s/                  "/fs-qr/s/[redacted]";
    ~^/fs-qr/[^/]+/[^/]+         "/fs-qr/[redacted]/[redacted]";
    default                      $request_uri;
}

log_format fsqr_redacted '$remote_addr - $remote_user [$time_local] '
                         '"$request_method $fsqr_loggable_uri $server_protocol" '
                         '$status $body_bytes_sent "$http_referer" "$http_user_agent"';

# アプリ（gunicorn）への upstream。keepalive で毎リクエストの TCP 確立コストを
# 削減する。keepalive を効かせるには proxy 側で HTTP/1.1 かつ Connection 空が必須。
#
# Blue-Green: アクティブな色だけを書いた backend ファイルを include する。
# デプロイスクリプトがこのファイルを
#   server 127.0.0.1:5000;   (blue)  /  server 127.0.0.1:5030;   (green)
# に書き換えて `nginx -s reload` することで、無停止でアトミックに切替える。
# 初回セットアップ時に deploy/fsqr_active_backend.conf.example を
# /etc/nginx/fsqr_active_backend.conf へ配置すること。
upstream fsqr_app {
    include /etc/nginx/fsqr_active_backend.conf;
    keepalive 32;
}

# テキスト系レスポンスを圧縮し、転送量と体感速度を改善する。
# （画像・zip などバイナリは既に圧縮済みのため対象外。）
# gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 5;
gzip_min_length 1024;
gzip_types
    text/plain
    text/css
    text/xml
    text/javascript
    application/javascript
    application/json
    application/xml
    application/rss+xml
    image/svg+xml;

server {
    listen 443 ssl;
    server_name www.fs-qr.net;
    ssl_certificate /etc/letsencrypt/live/fs-qr.net/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/fs-qr.net/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
    return 301 https://fs-qr.net$request_uri;
}

server {
    server_name fs-qr.net;

    # Certbot実行後にリダイレクト設定がここに挿入されます。
    # 元々のif文を使ったリダイレクトは非推奨のため削除しました。
    # Certbotが最適なリダイレクトを自動設定します。
    # もしHTTPでもアクセスさせたい場合は、以下のlocationブロックを追加してください。
    location /ws/ {
        proxy_pass http://fsqr_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600;
        proxy_send_timeout 3600;
    }

    # アプリが X-Accel-Redirect で指定する内部専用ロケーション。
    # ダウンロード時の実ファイル転送を nginx に委譲し、Python ワーカーを占有させない。
    # `internal` のため外部から直接アクセスはできず、認証はアプリ側で済んでいる。
    # alias のパスは docker-compose の bind mount（./storage → /app/storage）が
    # 指すホスト側の絶対パスに一致させること。
    location /_protected/fsqr/ {
        internal;
        alias /home/kota/fs-qr/storage/fsqr_uploads/;
    }

    location /_protected/group/ {
        internal;
        alias /home/kota/fs-qr/storage/group_uploads/;
    }

    # /static/ 配下はテンプレート側で `?v=<mtime>` のキャッシュバスティングを行うため
    # ブラウザ・CDN に対して長期キャッシュ可能。
    location = /static/group_uploads {
        return 404;
    }

    location ^~ /static/group_uploads/ {
        return 404;
    }

    # 静的アセットはパーミッション問題（Nginxが/home/kotaを読み取れない等）を回避するため、
    # Nginx直配信ではなくアプリ（gunicorn/FastAPI）を経由させます。
    location /static/ {
        proxy_pass http://fsqr_app;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    # 配信内容が定期的に変わるためブラウザ側で短時間キャッシュさせる。
    location = /sitemap.xml {
        proxy_pass http://fsqr_app;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "public, max-age=3600" always;
    }

    location = /robots.txt {
        proxy_pass http://fsqr_app;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "public, max-age=86400" always;
    }

    location = /ads.txt {
        proxy_pass http://fsqr_app;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "public, max-age=86400" always;
    }

    location / {
        proxy_pass http://fsqr_app;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # セキュリティヘッダー（HSTS / CSP / X-Frame-Options など）はアプリ側の
    # security_headers.py ミドルウェアが全レスポンスに付与する。
    # nginx の add_header は location 単位で server レベル定義を上書きして
    # 漏れる location ができるため、ここでは定義しない。

    access_log /var/log/nginx/access.log fsqr_redacted;

    client_max_body_size 500M;

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/fs-qr.net/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/fs-qr.net/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot


}server {
    if ($host = www.fs-qr.net) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    if ($host = fs-qr.net) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    server_name fs-qr.net www.fs-qr.net;
    return 404; # managed by Certbot




}
