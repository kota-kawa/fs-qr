services:
  web:
    build: .
    ports:
      - "5000:5000"
    environment:
      - SQL_USER=${SQL_USER}
      - SQL_PW=${SQL_PW}
      - SQL_DB=${SQL_DB}
      - SQL_HOST=db  # MySQLコンテナを指定
    volumes:
      - .:/app

    depends_on:
      db:
        condition: service_healthy
    command: /usr/local/bin/wait-for-it db:3306 --strict --timeout=120 -- uvicorn app:app --host 0.0.0.0 --port=5000 --reload

  db:
    image: mysql:8.4.9
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${SQL_DB}
      MYSQL_USER: ${SQL_USER}
      MYSQL_PASSWORD: ${SQL_PW}
    volumes:
      - db_data:/var/lib/mysql
      - ./db_init/create_tables.sql:/docker-entrypoint-initdb.d/00_create_tables.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 30s

volumes:
  db_data:
    name: ${MYSQL_VOLUME_NAME:-fsqr_mysql_data_v2}
