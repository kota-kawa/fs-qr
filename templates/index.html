  <style>
    /* リセット */
    html, body {
      margin: 0;
      padding: 0;
      font-family: 'Arial', sans-serif;
    }

    /* グラデーション背景をコンテナに移動 */
      .menu-container {
        display: flex;
        flex-direction: column;
        min-height: 100vh;
        box-sizing: border-box;
        padding: 40px 40px calc(40px + env(safe-area-inset-bottom));
        background: linear-gradient(135deg, #342ae3, #23cf32);
        background-repeat: no-repeat;
        background-size: cover;
      }

      .menu-content {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }

    .menu-header {
      text-align: center;
      margin-bottom: 28px;
      color: #fff;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
    }
    .menu-header h1 {
      font-size: 3rem;
      font-weight: bold;
      margin: 0;
    }
    .menu-header p {
      font-size: 1.5rem;
      margin-top: 10px;
    }

    .top-search-panel {
      width: min(100%, 660px);
      margin: 0 auto 30px;
      padding: 14px;
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 6px 15px rgba(0,0,0,0.1);
      transition: transform 0.2s ease, box-shadow 0.2s ease, background-color 0.2s ease;
    }

    .top-search-panel:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(0,0,0,0.22);
      background-color: #F0F8FF;
    }

    .top-search-form {
      display: grid;
      grid-template-columns: 44px minmax(0, 1fr) minmax(0, 1fr) 104px;
      gap: 10px;
      align-items: center;
    }

    .top-search-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      color: #4082dd;
      font-size: 1.35rem;
    }

    .top-search-field label {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    .top-search-field input {
      width: 100%;
      min-height: 44px;
      padding: 0.72rem 0.9rem;
      border: 1px solid #d1d5db;
      border-radius: 12px;
      color: #111827;
      background: #f9fafb;
      font-size: 1rem;
    }

    .top-search-field input:focus {
      outline: none;
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.14);
    }

    .top-search-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      min-height: 44px;
      padding: 0 1rem;
      border: 0;
      border-radius: 12px;
      color: #ffffff;
      background: #4082dd;
      font-weight: 700;
      white-space: nowrap;
      transition: background-color 0.2s ease, transform 0.2s ease;
    }

    .top-search-button:hover {
      background: #2563eb;
      transform: translateY(-1px);
    }

    .menu-list {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 20px;
      padding: 0;
      margin: 0;
      list-style: none;
    }

    .menu-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #fff;
      width: 200px;
      height: 200px;
      border-radius: 20px;
      box-shadow: 0 6px 15px rgba(0,0,0,0.1);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      text-decoration: none;
      color: #333;
      text-align: center;
    }
    .menu-item:hover {
      transform: scale(1.05);
      box-shadow: 0 10px 20px rgba(0,0,0,0.3);
      background-color: #F0F8FF;
    }
    .menu-item.group   i { font-size: 3rem; color: #4aba95; margin-bottom: 15px; }
    .menu-item.fs-qr   i { font-size: 3rem; color: #4082dd; margin-bottom: 15px; }
    .menu-item.note    i { font-size: 3rem; color: #64ba4a; margin-bottom: 15px; }
    .menu-item h3 {
      font-size: 1.5rem;
      margin: 0;
      color: #333;
    }

    /* スマホ表示時：ボタンを大きく */
    @media (max-width: 576px) {
      .menu-container {
        padding: 20px 15px calc(20px + env(safe-area-inset-bottom));
      }
      .menu-header {
        margin-top: 10px;
        margin-bottom: 22px;
      }
      .menu-header h1 { font-size: 2rem; }
      .menu-header p  { font-size: 1rem; }
      .top-search-panel {
        width: min(100%, 360px);
        margin-bottom: 24px;
        padding: 12px;
        border-radius: 18px;
      }
      .top-search-form {
        grid-template-columns: 1fr 1fr;
      }
      .top-search-icon {
        display: none;
      }
      .top-search-button {
        width: 100%;
        grid-column: 1 / -1;
      }
      .menu-list      { gap: 10px; }
      .menu-item      { width: 160px; height: 160px; }
      .menu-item h3   { font-size: 1.1rem; }
      .menu-item.group i,
      .menu-item.fs-qr i,
      .menu-item.note i {
        font-size: 2.5rem;
        margin-bottom: 12px;
      }
    }

    /* より小さいスマホ向け */
    @media (max-width: 480px) {
      .menu-container {
        padding: 15px 10px calc(15px + env(safe-area-inset-bottom));
      }
      .menu-header h1 { font-size: 1.8rem; }
      .menu-list {
        flex-direction: column;
        align-items: center;
        gap: 12px;
      }
      .menu-item    { width: 150px; height: 150px; }
      .menu-item h3 { font-size: 1rem; }
      .menu-item.group i,
      .menu-item.fs-qr i,
      .menu-item.note i {
        font-size: 2.3rem;
        margin-bottom: 10px;
      }
    }
  </style>
</head>
<body>
  <div class="menu-container">
    <div class="menu-content">
      <div class="menu-header">
        <h1>ファイル共有メニュー</h1>
        <p>検索または共有方法を選択</p>
      </div>
      <section class="top-search-panel" aria-label="横断検索">
        <form class="top-search-form" action="/search_all" method="POST">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
          <div class="top-search-icon">
            <i class="fas fa-search" aria-hidden="true"></i>
          </div>
          <div class="top-search-field">
            <label for="topSearchId">ID</label>
            <input type="text" id="topSearchId" name="id"
                   minlength="6" maxlength="6" pattern="[a-zA-Z0-9]{6}"
                   placeholder="ID" required
                   title="6文字の半角英数字で入力してください">
          </div>
          <div class="top-search-field">
            <label for="topSearchPassword">PW</label>
            <input type="password" id="topSearchPassword" name="password"
                   minlength="6" maxlength="64" pattern="(?:[0-9]{6}|[A-Za-z0-9_-]{8,64})"
                   placeholder="PW" required
                   title="共有されたパスワードを入力してください">
          </div>
          <button type="submit" class="top-search-button">
            <span>検索</span>
          </button>
        </form>
      </section>
      <ul class="menu-list">
        <li>

            <h3>グループで共有</h3>

          </a>
        </li>
        <li>

            <i class="fas fa-pencil-alt"></i>
            <h3>ノート共有</h3>
          </a>
        </li>

    </div>
