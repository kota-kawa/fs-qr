<style>
/* Override colors for Group room to match create/search pages */
.modern-card-header {
  --modern-card-header-gradient: var(--theme-group-gradient);
  --modern-card-header-accent: var(--theme-group-accent);
}

.room-info-card {
  --room-info-header-gradient: var(--theme-group-gradient);
}

.usage-section {
  --usage-header-gradient: var(--theme-group-gradient);
  --usage-header-accent: var(--theme-group-accent);
}

.modern-page-container {
  min-height: auto;
  background: transparent;
  padding-top: 1.5rem;
  padding-bottom: 1rem;
}

.copy-url-button {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: var(--size-action-button);
  height: var(--size-action-button);
  padding: 0;
  border-radius: var(--radius-pill);
  border: none;
  background: var(--theme-group-gradient);
  color: var(--bg-white);
  cursor: pointer;
  transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
}

.copy-url-button svg {
  width: var(--size-action-icon);
  height: var(--size-action-icon);
  flex: none;
}

.copy-url-button:hover,
.copy-url-button:focus-visible {
  transform: translateY(-1px);
  box-shadow: 0 10px 15px -8px var(--theme-group-shadow-soft);
}

.copy-url-button:active {
  transform: translateY(0);
}

.copy-url-button.copied {
  background: var(--theme-group-copy-copied-gradient);
}

.upload-status-message {
  margin-top: 1rem;
  font-weight: 600;
  color: var(--theme-group-start);
  display: none;
}

.upload-status-message.is-error {
  color: var(--theme-group-upload-status-error);
}

.group-transfer-card {
  display: grid;
  grid-template-columns: 88px minmax(0, 1fr);
  align-items: center;
  gap: 1rem;
  margin-top: 1rem;
  padding: 1rem 1.15rem;
  border-radius: 22px;
  border: 1px solid rgba(74, 186, 149, 0.18);
  background:
    linear-gradient(135deg, rgba(255, 255, 255, 0.96), rgba(244, 251, 247, 0.88)),
    var(--surface-elevated, #fff);
  box-shadow: 0 20px 40px -28px rgba(15, 23, 42, 0.35);
  overflow: hidden;
}

.group-transfer-card__visual {
  position: relative;
  width: 88px;
  height: 88px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.group-transfer-card__orb {
  position: absolute;
  inset: 0;
  border-radius: 50%;
  background:
    radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.92), rgba(219, 243, 232, 0.25) 58%, rgba(74, 186, 149, 0.18));
  box-shadow:
    inset 0 1px 0 rgba(255, 255, 255, 0.8),
    0 14px 30px -18px rgba(74, 186, 149, 0.5);
}

.group-transfer-card__orb::before,
.group-transfer-card__orb::after {
  content: "";
  position: absolute;
  inset: 8px;
  border-radius: 50%;
  border: 1px solid rgba(74, 186, 149, 0.16);
}

.group-transfer-card__orb::before {
  animation: group-transfer-pulse 2.4s ease-in-out infinite;
}

.group-transfer-card__orb::after {
  inset: -4px;
  border-color: rgba(136, 210, 186, 0.28);
  animation: group-transfer-spin 6s linear infinite;
}

.group-transfer-card__icon {
  position: absolute;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  color: var(--theme-group-end);
  transition: transform 0.3s ease, opacity 0.3s ease;
}

.group-transfer-card__icon--file {
  transform: translateX(-7px);
  color: #178f6d;
  animation: group-transfer-file-float 2.1s ease-in-out infinite;
}

.group-transfer-card__icon--upload {
  width: 34px;
  height: 34px;
  right: 2px;
  bottom: 8px;
  border-radius: 999px;
  background: linear-gradient(135deg, #4aba95, #1d9a75);
  color: #fff;
  box-shadow: 0 12px 24px -16px rgba(29, 154, 117, 0.8);
  animation: group-transfer-arrow-bob 1.4s ease-in-out infinite;
}

.group-transfer-card__content {
  min-width: 0;
}

.group-transfer-card__eyebrow {
  margin-bottom: 0.3rem;
  color: #1d9a75;
  font-size: 0.78rem;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

.group-transfer-card__title {
  color: var(--text-dark);
  font-weight: 700;
  line-height: 1.45;
}

.group-transfer-card__progress {
  margin-top: 0.85rem;
  height: 12px;
  border-radius: 999px;
  background: linear-gradient(90deg, rgba(74, 186, 149, 0.12), rgba(15, 23, 42, 0.08));
  box-shadow: inset 0 1px 2px rgba(15, 23, 42, 0.08);
}

.group-transfer-card__progress .progress-bar {
  background: linear-gradient(90deg, #4aba95, #2cb67d 55%, #8ad9ba);
  border-radius: inherit;
  box-shadow: 0 0 22px rgba(74, 186, 149, 0.35);
}

.group-download-overlay {
  padding: 1.5rem;
}

.group-download-panel.spinner-second-container {
  position: relative;
  width: min(100%, 420px);
  height: auto;
  padding: 1.5rem 1.5rem 1.35rem;
  background:
    linear-gradient(145deg, rgba(255, 255, 255, 0.97), rgba(240, 249, 255, 0.92));
  border: 1px solid rgba(255, 255, 255, 0.82);
  border-radius: 30px;
  box-shadow:
    0 30px 60px -34px rgba(15, 23, 42, 0.45),
    inset 0 1px 0 rgba(255, 255, 255, 0.75);
  overflow: hidden;
}

.group-download-panel__glow {
  position: absolute;
  inset: -25% auto auto 50%;
  width: 260px;
  height: 260px;
  transform: translateX(-50%);
  border-radius: 50%;
  background: radial-gradient(circle, rgba(74, 186, 149, 0.18), rgba(59, 130, 246, 0.1) 45%, transparent 72%);
  pointer-events: none;
}

.group-download-panel__visual {
  position: relative;
  width: 156px;
  height: 156px;
  margin: 0 auto 1rem;
  display: flex;
  align-items: center;
  justify-content: center;
}

.group-download-panel__visual::before,
.group-download-panel__visual::after {
  content: "";
  position: absolute;
  border-radius: 50%;
}

.group-download-panel__visual::before {
  inset: 0;
  background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.96), rgba(223, 245, 236, 0.42) 58%, rgba(74, 186, 149, 0.18));
  box-shadow:
    inset 0 1px 0 rgba(255, 255, 255, 0.9),
    0 20px 45px -28px rgba(15, 23, 42, 0.45);
}

.group-download-panel__visual::after {
  inset: 10px;
  border: 1px solid rgba(74, 186, 149, 0.18);
  animation: group-transfer-spin 10s linear infinite;
}

.group-download-panel .icon {
  position: absolute;
  top: 50%;
  left: 50%;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  transform: translate(-50%, -50%);
  transition: transform 0.5s ease, opacity 0.5s ease, filter 0.5s ease;
}

.group-download-panel__icon--file {
  color: #178f6d;
  opacity: 1;
}

.group-download-panel__icon--download {
  width: 50px;
  height: 50px;
  border-radius: 999px;
  background: linear-gradient(135deg, #38bdf8, #2563eb);
  color: #fff;
  opacity: 0.92;
  box-shadow: 0 18px 28px -18px rgba(37, 99, 235, 0.75);
}

.group-download-panel.downloading .group-download-panel__icon--file {
  transform: translate(-50%, -50%) translateY(-10px) scale(0.9);
  filter: saturate(1.1);
}

.group-download-panel.downloading .group-download-panel__icon--download {
  transform: translate(-50%, -50%) translateY(24px);
  animation: group-download-bounce 1.3s ease-in-out infinite;
}

.group-download-panel__content {
  position: relative;
  z-index: 1;
}

.group-download-panel__eyebrow {
  margin-bottom: 0.35rem;
  text-align: center;
  color: #2563eb;
  font-size: 0.78rem;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

.group-download-panel .text {
  position: static;
  width: auto;
  margin: 0;
  text-align: center;
  color: var(--text-dark);
  font-size: 1.05rem;
  font-weight: 700;
  background: none;
  -webkit-text-fill-color: currentColor;
  animation: none;
}

.group-download-panel__progress {
  position: static;
  width: 100%;
  height: 12px;
  margin-top: 1rem;
  background: linear-gradient(90deg, rgba(37, 99, 235, 0.12), rgba(15, 23, 42, 0.08));
  border-radius: 999px;
  overflow: hidden;
}

.group-download-panel__progress .progress-bar {
  background: linear-gradient(90deg, #38bdf8, #2563eb 58%, #60a5fa);
  border-radius: inherit;
  box-shadow: 0 0 24px rgba(37, 99, 235, 0.35);
}

@keyframes group-transfer-pulse {
  0%,
  100% {
    transform: scale(0.94);
    opacity: 0.55;
  }

  50% {
    transform: scale(1.04);
    opacity: 1;
  }
}

@keyframes group-transfer-spin {
  from {
    transform: rotate(0deg);
  }

  to {
    transform: rotate(360deg);
  }
}

@keyframes group-transfer-file-float {
  0%,
  100% {
    transform: translateX(-7px) translateY(0);
  }

  50% {
    transform: translateX(-7px) translateY(-5px);
  }
}

@keyframes group-transfer-arrow-bob {
  0%,
  100% {
    transform: translateY(0);
  }

  50% {
    transform: translateY(-4px);
  }
}

@keyframes group-download-bounce {
  0%,
  100% {
    transform: translate(-50%, -50%) translateY(24px);
  }

  40% {
    transform: translate(-50%, -50%) translateY(32px);
  }

  70% {
    transform: translate(-50%, -50%) translateY(20px);
  }
}

@media (max-width: 640px) {
  .group-transfer-card {
    grid-template-columns: 1fr;
    justify-items: center;
    text-align: center;
    padding: 1rem;
  }

  .group-transfer-card__content {
    width: 100%;
  }

  .group-download-panel.spinner-second-container {
    padding: 1.25rem 1rem 1.1rem;
    border-radius: 24px;
  }

  .group-download-panel__visual {
    width: 132px;
    height: 132px;
    margin-bottom: 0.9rem;
  }

  .group-download-panel .text {
    font-size: 0.98rem;
  }
}


/* Clean room info values */
.room-info-value-row {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  min-width: 0;
}

.room-info-value-text {
  font-weight: 600;
  word-break: break-all;
  color: var(--text-dark);
}

.room-info-value-row .copy-inline-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: var(--size-inline-action-button);
  height: var(--size-inline-action-button);
  padding: 0;
  border: none;
  border-radius: var(--radius-sm);
  background: transparent;
  color: var(--text-light);
  cursor: pointer;
  flex-shrink: 0;
  transition: color 0.15s, background 0.15s;
}

.room-info-value-row .copy-inline-btn:hover {
  color: var(--theme-group-start);
  background: var(--theme-group-inline-hover-bg);
}

.room-info-value-row .copy-inline-btn.copied {
  color: var(--theme-group-inline-copied);
}

.room-info-value-row .copy-inline-btn svg {
  width: var(--size-inline-action-icon);
  height: var(--size-inline-action-icon);
}

.room-info-url-text {
  font-weight: 600;
  word-break: break-all;
  color: var(--text-dark);
  font-size: var(--font-size-room-url);
  line-height: 1.4;
}


.share-feedback {
  display: none;
  margin-bottom: 1rem;
  padding: 0.85rem 1rem;
  border-radius: var(--radius-lg);
  font-weight: 600;
}

.share-feedback.is-visible {
  display: block;
}

.share-feedback.is-success {
  background: var(--status-success-bg);
  color: var(--status-success-text);
}

.share-feedback.is-error {
  background: var(--status-error-bg);
  color: var(--status-error-text);
}

/* Upload area colors to match Group theme */
.modern-upload-area {
  border-color: var(--theme-group-end);
  background: var(--theme-group-upload-bg);
}

.modern-upload-area:hover,
.modern-upload-area.dragover {
  border-color: var(--theme-group-start);
  background: var(--theme-group-upload-bg-hover);
  box-shadow: var(--theme-group-upload-shadow);
}

.upload-icon-modern {
  color: var(--theme-group-end);
}

.upload-button-modern {
  background: var(--theme-group-gradient);
  box-shadow: var(--theme-group-button-shadow);
}

.upload-button-modern:hover {
  box-shadow: var(--theme-group-button-shadow-hover);
}

.modern-file-icon {
  color: var(--theme-group-end);
}

.modern-file-item:hover {
  background: var(--theme-group-file-item-hover-bg);
}

.modern-btn {
  background: var(--theme-group-gradient);
  box-shadow: var(--theme-group-button-shadow);
}

.modern-btn:hover {
  box-shadow: var(--theme-group-button-shadow-hover);
  color: var(--bg-white);
}
</style>
