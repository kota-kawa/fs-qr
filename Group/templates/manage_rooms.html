{% extends "group_layout.html" %}

{% block extra_head %}
  <meta name="robots" content="noindex, nofollow">
{% endblock %}

{% block contents %}
<div class="container mt-4" style="max-width: 800px; margin: 0 auto;">
    <h1 class="mb-4 text-center">ルーム管理</h1>

    <!-- すべて削除ボタン -->
    <form method="post" action="/delete_all_rooms" class="text-center" data-confirm-submit="本当にすべてのルームを削除しますか？">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <button type="submit" class="btn btn-danger mb-3">すべて削除</button>
    </form>

    <!-- ルーム一覧テーブル -->
    <table class="table table-striped">
        <thead>
            <tr>
                <th>ルームID</th>
                <th>ID</th>
                <th>パスワード</th>
                <th>自動削除</th>
                <th>操作</th>
            </tr>
        </thead>
        <tbody>
            {% for room in rooms %}
            <tr>
                <td>{{ room.room_id }}</td>
                <td>{{ room.id }}</td>
                <td>{{ room.password }}</td>
                <td>{{ room.retention_days }}日</td>
                <td>
                    <form method="post" action="/delete_room/{{ room.room_id }}" data-confirm-submit="このルームを削除しますか？">
                        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                        <button type="submit" class="btn btn-sm btn-danger">削除</button>
                    </form>
                </td>
            </tr>
            {% else %}
            <tr>
                <td colspan="5" class="text-center">ルームがありません</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
<script>
document.querySelectorAll('[data-confirm-submit]').forEach(function(form) {
    form.addEventListener('submit', async function(event) {
        if (form.dataset.confirmed === 'true') {
            return;
        }
        event.preventDefault();
        var confirmed = await window.showConfirmModal(form.dataset.confirmSubmit, {
            title: '削除の確認',
            confirmLabel: '削除する'
        });
        if (confirmed) {
            form.dataset.confirmed = 'true';
            form.submit();
        }
    });
});
</script>
{% endblock %}
